name: Auto Generate X Post Queue

on:
  schedule:
    # 毎日 18:00 UTC (JST 深夜 3:00) に自動実行
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行用トリガー

jobs:
  generate-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate new posts and update queue
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 tools/auto_generate_queue.py

      - name: Commit updated queue.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/config/x_post_queue.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate new X posts from Slack" && git push)
